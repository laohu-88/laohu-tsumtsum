<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#10151c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="老胡的松松总动员" />
    <title>老胡的松松总动员</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon-192.png" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #10151c;
        font-family: Arial, "Microsoft YaHei", sans-serif;
        touch-action: none;
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      #game-root {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 35% 18%, rgba(255, 208, 119, 0.28), transparent 28%),
          linear-gradient(160deg, #152235 0%, #121820 52%, #1d1720 100%);
      }

      canvas {
        display: block;
        width: min(100vw, calc(100vh * 430 / 932));
        height: min(100vh, calc(100vw * 932 / 430));
        max-width: 100vw;
        max-height: 100vh;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        -webkit-touch-callout: none;
        -webkit-user-select: none;
        user-select: none;
      }

      .loading {
        position: fixed;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        color: rgba(255, 255, 255, 0.88);
        font-size: 15px;
        letter-spacing: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="game-root">
      <div id="loading" class="loading">Loading...</div>
    </div>

    <script src="https://pixijs.download/release/pixi.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/matter-js@0.20.0/build/matter.min.js"></script>
    <script src="./game.js?v=15"></script>
    <script>
      window.addEventListener("contextmenu", (event) => event.preventDefault(), { capture: true });
      window.addEventListener("selectstart", (event) => event.preventDefault(), { capture: true });
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
